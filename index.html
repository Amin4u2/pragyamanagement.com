// ═══════════════════════════════════════════════════════════════════
// EXPENDITURE VIEW
// ═══════════════════════════════════════════════════════════════════
function VExpenditure({drivers,expenditure,updExpenditure,yearSales,selYear,selMonth}){
  const [tab,setTab]=useState("summary");
  const [modal,setModal]=useState(null);
  const exp=expenditure||{oilChanges:[],mechanical:[],roadworthy:{},insurance:{}};

  const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,5);
  const fmtD=d=>{if(!d)return"—";try{return new Date(d+"T12:00").toLocaleDateString("en-GH",{day:"numeric",month:"short",year:"numeric"});}catch(e){return d;}};
  const addDays=(d,n)=>{if(!d)return"";const dt=new Date(d+"T12:00");dt.setDate(dt.getDate()+n);return dt.toISOString().slice(0,10);};
  const addYears=(d,n)=>{if(!d)return"";const dt=new Date(d+"T12:00");dt.setFullYear(dt.getFullYear()+n);return dt.toISOString().slice(0,10);};
  const daysUntil=d=>{if(!d)return null;return Math.ceil((new Date(d+"T12:00")-new Date())/86400000);};
  const urgColor=d=>{if(d===null)return"var(--text3)";if(d<0||d<=30)return"var(--red)";if(d<=60)return"var(--gold)";return"var(--green)";};
  const urgLabel=d=>{if(d===null)return"Not set";if(d<0)return Math.abs(d)+"d OVERDUE";if(d===0)return"Due TODAY";return d+"d away";};

  const totOil =(exp.oilChanges||[]).reduce((s,r)=>s+(Number(r.cost)||0),0);
  const totMech=(exp.mechanical ||[]).reduce((s,r)=>s+(Number(r.cost)||0),0);
  const totRW  =Object.values(exp.roadworthy||{}).reduce((s,r)=>s+(Number(r.cost)||0),0);
  const totIns =Object.values(exp.insurance ||{}).reduce((s,r)=>s+(Number(r.cost)||0),0);
  const totExp=totOil+totMech+totRW+totIns;
  const netBal=yearSales-totExp;

  const alertOil=drivers.filter(d=>{
    const last=(exp.oilChanges||[]).filter(o=>o.driverId===d.id).sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
    return !last||daysUntil(addDays(last.date,14))<=3;
  });
  const alertRW =drivers.filter(d=>{const r=exp.roadworthy?.[d.id];return r?.lastDate&&daysUntil(addYears(r.lastDate,1))<=60;});
  const alertIns=drivers.filter(d=>{const r=exp.insurance ?.[d.id];return r?.lastDate&&daysUntil(addYears(r.lastDate,1))<=60;});

  const saveOil =rec=>{const l=exp.oilChanges||[];updExpenditure({...exp,oilChanges:rec.id?l.map(r=>r.id===rec.id?rec:r):[...l,{...rec,id:uid()}]});setModal(null);};
  const delOil  =id=>{if(!confirm("Delete oil change?"))return;updExpenditure({...exp,oilChanges:(exp.oilChanges||[]).filter(r=>r.id!==id)});};
  const saveMech=rec=>{const l=exp.mechanical||[];updExpenditure({...exp,mechanical:rec.id?l.map(r=>r.id===rec.id?rec:r):[...l,{...rec,id:uid()}]});setModal(null);};
  const delMech =id=>{if(!confirm("Delete fault record?"))return;updExpenditure({...exp,mechanical:(exp.mechanical||[]).filter(r=>r.id!==id)});};
  const saveRW  =(did,rec)=>{updExpenditure({...exp,roadworthy:{...exp.roadworthy,[did]:rec}});setModal(null);};
  const saveIns =(did,rec)=>{updExpenditure({...exp,insurance:{...exp.insurance,[did]:rec}});setModal(null);};

  const IS={width:"100%",background:"var(--bg)",border:"1px solid var(--border2)",borderRadius:6,color:"var(--text)",padding:"12px 14px",fontSize:13,outline:"none",fontFamily:"var(--fm)"};
  const TABS=[
    {id:"summary",   label:"📊 Summary",   ico:"dashboard"},
    {id:"oil",       label:"🛢 Oil Change", ico:"oil"},
    {id:"mechanical",label:"🔧 Mechanical", ico:"wrench"},
    {id:"roadworthy",label:"🛡 Roadworthy", ico:"roadworthy"},
    {id:"insurance", label:"🔒 Insurance",  ico:"shield"},
  ];

  return(
    <div style={{padding:"16px 14px",maxWidth:900,margin:"0 auto"}}>
      <div style={{marginBottom:14}}>
        <div style={{fontSize:15,fontWeight:700,color:"var(--gold)",letterSpacing:2,textTransform:"uppercase"}}>💸 Expenditure Tracker</div>
        <div style={{fontSize:12,color:"var(--text3)",marginTop:3}}>Track all vehicle costs and estimate net profit from total {selYear} sales</div>
      </div>

      {/* Alerts */}
      {(alertOil.length||alertRW.length||alertIns.length)>0&&(
        <div style={{background:"#ef444412",border:"1px solid #ef444433",borderRadius:8,padding:"12px 16px",marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:700,color:"var(--red)",letterSpacing:2,marginBottom:8}}>🔔 ATTENTION REQUIRED</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
            {alertOil.map(d=><span key={d.id} style={{fontSize:11,padding:"3px 10px",background:"#f5a62322",color:"var(--gold)",border:"1px solid #f5a62344",borderRadius:5}}>🛢 Oil due: {d.name||d.plate}</span>)}
            {alertRW.map(d=>{const days=daysUntil(addYears(exp.roadworthy[d.id].lastDate,1));return<span key={d.id} style={{fontSize:11,padding:"3px 10px",background:"#3b82f622",color:"var(--blue)",border:"1px solid #3b82f644",borderRadius:5}}>🛡 RW {urgLabel(days)}: {d.name||d.plate}</span>;})}
            {alertIns.map(d=>{const days=daysUntil(addYears(exp.insurance[d.id].lastDate,1));return<span key={d.id} style={{fontSize:11,padding:"3px 10px",background:"#22c55e22",color:"var(--green)",border:"1px solid #22c55e44",borderRadius:5}}>🔒 Ins {urgLabel(days)}: {d.name||d.plate}</span>;})}
          </div>
        </div>
      )}

      {/* Tab bar */}
      <div style={{display:"flex",gap:5,marginBottom:16,overflowX:"auto",paddingBottom:2}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)}
            style={{padding:"9px 14px",background:tab===t.id?"var(--gold)":"var(--bg2)",border:`1px solid ${tab===t.id?"var(--gold)":"var(--border)"}`,borderRadius:7,cursor:"pointer",color:tab===t.id?"#0a0a0f":"var(--text3)",fontFamily:"var(--fm)",fontSize:11,whiteSpace:"nowrap",flexShrink:0,transition:"all .15s",letterSpacing:1}}>
            {t.label}
          </button>
        ))}
      </div>

      {/* SUMMARY */}
      {tab==="summary"&&(
        <div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:10,marginBottom:14}}>
            {[
              {label:`${selYear} Sales`,val:yearSales,color:"var(--gold)"},
              {label:"Total Costs",val:totExp,color:"var(--red)"},
              {label:"Net Balance",val:netBal,color:netBal>=0?"var(--green)":"var(--red)",sub:netBal>=0?"After all costs":"⚠ Costs exceed income"},
            ].map(({label,val,color,sub})=>(
              <div key={label} style={{background:"var(--bg2)",border:`1px solid ${color}25`,borderRadius:8,padding:14}}>
                <div style={{fontSize:11,letterSpacing:2,color:"var(--text3)",marginBottom:5,textTransform:"uppercase"}}>{label}</div>
                <div style={{fontSize:18,fontWeight:800,color,fontFamily:"var(--fd)"}}>{fmt(val)}</div>
                {sub&&<div style={{fontSize:10,color:"var(--text3)",marginTop:3}}>{sub}</div>}
              </div>
            ))}
          </div>
          {totExp>0&&(
            <div style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:8,padding:16,marginBottom:14}}>
              <div style={{fontSize:11,letterSpacing:2,color:"var(--text3)",marginBottom:12,textTransform:"uppercase"}}>Cost Breakdown</div>
              {[["🛢 Oil Changes",totOil,"#f5a623"],["🔧 Mechanical",totMech,"var(--red)"],["🛡 Roadworthy",totRW,"var(--blue)"],["🔒 Insurance",totIns,"var(--green)"]].map(([lbl,val,col])=>(
                <div key={lbl} style={{marginBottom:10}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                    <span style={{fontSize:12,color:"var(--text2)"}}>{lbl}</span>
                    <span style={{fontSize:12,fontWeight:700,color:col}}>{fmt(val)}</span>
                  </div>
                  <div style={{height:5,background:"var(--border)",borderRadius:3,overflow:"hidden"}}>
                    <div style={{height:"100%",background:col,borderRadius:3,width:`${totExp>0?val/totExp*100:0}%`}}/>
                  </div>
                </div>
              ))}
              <div style={{display:"flex",justifyContent:"space-between",paddingTop:10,borderTop:"1px solid var(--border)"}}>
                <span style={{fontSize:12,color:"var(--text3)"}}>Costs as % of year sales</span>
                <span style={{fontSize:13,fontWeight:700,color:yearSales>0&&totExp/yearSales>0.3?"var(--red)":"var(--gold)"}}>{yearSales>0?(totExp/yearSales*100).toFixed(1):0}%</span>
              </div>
            </div>
          )}
          <div style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:8,padding:16}}>
            <div style={{fontSize:11,letterSpacing:2,color:"var(--text3)",marginBottom:12,textTransform:"uppercase"}}>Per Vehicle Summary</div>
            {drivers.length===0&&<div style={{fontSize:12,color:"var(--text3)"}}>No drivers added yet.</div>}
            {drivers.map(d=>{
              const oils=(exp.oilChanges||[]).filter(o=>o.driverId===d.id).reduce((s,o)=>s+(Number(o.cost)||0),0);
              const mechs=(exp.mechanical||[]).filter(m=>m.driverId===d.id).reduce((s,m)=>s+(Number(m.cost)||0),0);
              const rw=Number(exp.roadworthy?.[d.id]?.cost)||0;
              const ins=Number(exp.insurance?.[d.id]?.cost)||0;
              const tot=oils+mechs+rw+ins;
              const lastOil=(exp.oilChanges||[]).filter(o=>o.driverId===d.id).sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
              const oilD=lastOil?daysUntil(addDays(lastOil.date,14)):null;
              const rwD=exp.roadworthy?.[d.id]?.lastDate?daysUntil(addYears(exp.roadworthy[d.id].lastDate,1)):null;
              const insD=exp.insurance?.[d.id]?.lastDate?daysUntil(addYears(exp.insurance[d.id].lastDate,1)):null;
              return(
                <div key={d.id} style={{padding:"10px 0",borderBottom:"1px solid var(--border2)"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                    <div>
                      <span style={{fontSize:13,fontWeight:700,color:"var(--text)"}}>{d.name||"—"}</span>
                      <span style={{fontSize:11,color:"var(--text3)",marginLeft:8}}>{d.plate||""}</span>
                    </div>
                    <span style={{fontSize:14,fontWeight:800,color:tot>0?"var(--red)":"var(--text3)",fontFamily:"var(--fd)"}}>{fmt(tot)}</span>
                  </div>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:5}}>
                    {oils>0&&<span style={{fontSize:10,padding:"2px 8px",background:"#f5a62315",color:"var(--gold)",border:"1px solid #f5a62330",borderRadius:4}}>Oil {fmt(oils)}</span>}
                    {mechs>0&&<span style={{fontSize:10,padding:"2px 8px",background:"#ef444415",color:"var(--red)",border:"1px solid #ef444430",borderRadius:4}}>Mech {fmt(mechs)}</span>}
                    {rw>0&&<span style={{fontSize:10,padding:"2px 8px",background:"#3b82f615",color:"var(--blue)",border:"1px solid #3b82f630",borderRadius:4}}>RW {fmt(rw)}</span>}
                    {ins>0&&<span style={{fontSize:10,padding:"2px 8px",background:"#22c55e15",color:"var(--green)",border:"1px solid #22c55e30",borderRadius:4}}>Ins {fmt(ins)}</span>}
                  </div>
                  <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
                    <span style={{fontSize:11,color:urgColor(oilD)}}>🛢 Oil: {urgLabel(oilD)}</span>
                    <span style={{fontSize:11,color:urgColor(rwD)}}>🛡 RW: {urgLabel(rwD)}</span>
                    <span style={{fontSize:11,color:urgColor(insD)}}>🔒 Ins: {urgLabel(insD)}</span>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* OIL CHANGE */}
      {tab==="oil"&&(
        <div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <div>
              <div style={{fontSize:13,color:"var(--text2)"}}>Every <b style={{color:"var(--gold)"}}>2 weeks</b> per vehicle · Total: <b style={{color:"var(--gold)"}}>{fmt(totOil)}</b></div>
              <div style={{fontSize:11,color:"var(--text3)",marginTop:2}}>Alert triggers when 14+ days since last change</div>
            </div>
            <button className="btn" style={{fontSize:11,padding:"8px 14px"}} onClick={()=>setModal({type:"oil"})}>
              <Ic name="plus" size={12} color="#0a0a0f"/> Add Record
            </button>
          </div>
          {drivers.map(d=>{
            const records=(exp.oilChanges||[]).filter(o=>o.driverId===d.id).sort((a,b)=>new Date(b.date)-new Date(a.date));
            const last=records[0];
            const nextDue=last?addDays(last.date,14):null;
            const days=daysUntil(nextDue);
            return(
              <div key={d.id} style={{background:"var(--bg2)",border:`1px solid ${records.length&&days!==null&&days<=3?"var(--red)":"var(--border)"}`,borderRadius:8,padding:14,marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8,marginBottom:records.length?10:0}}>
                  <div>
                    <span style={{fontSize:13,fontWeight:700,color:"var(--text)"}}>{d.name||"—"}</span>
                    <span style={{fontSize:11,color:"var(--text3)",marginLeft:8}}>{d.plate||""}</span>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    {nextDue&&<span style={{fontSize:11,padding:"3px 10px",background:`${urgColor(days)}20`,color:urgColor(days),border:`1px solid ${urgColor(days)}40`,borderRadius:5}}>
                      Next: {fmtD(nextDue)} ({urgLabel(days)})
                    </span>}
                    <button onClick={()=>setModal({type:"oil",driverId:d.id})} style={{background:"var(--bg)",border:"1px solid var(--border2)",borderRadius:5,padding:"5px 10px",color:"var(--text2)",fontSize:11,cursor:"pointer",fontFamily:"var(--fm)"}}>+ Add</button>
                  </div>
                </div>
                {records.length===0?(
                  <div style={{fontSize:12,color:"var(--red)"}}>⚠ No oil change on record — add first record</div>
                ):(
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                    <thead><tr style={{color:"var(--text3)"}}>
                      <th style={{textAlign:"left",padding:"4px 0",borderBottom:"1px solid var(--border2)"}}>DATE</th>
                      <th style={{textAlign:"left",padding:"4px 0",borderBottom:"1px solid var(--border2)"}}>NOTES</th>
                      <th style={{textAlign:"right",padding:"4px 0",borderBottom:"1px solid var(--border2)"}}>COST</th>
                      <th style={{width:28,borderBottom:"1px solid var(--border2)"}}></th>
                    </tr></thead>
                    <tbody>
                      {records.map(r=>(
                        <tr key={r.id}>
                          <td style={{padding:"6px 0",color:"var(--text2)",whiteSpace:"nowrap"}}>{fmtD(r.date)}</td>
                          <td style={{padding:"6px 0",color:"var(--text3)"}}>{r.notes||"—"}</td>
                          <td style={{padding:"6px 0",textAlign:"right",color:"var(--gold)",fontWeight:700}}>{fmt(r.cost)}</td>
                          <td style={{padding:"6px 0",textAlign:"right"}}><button onClick={()=>delOil(r.id)} style={{background:"none",border:"none",cursor:"pointer",padding:2,opacity:.6}}><Ic name="trash" size={12} color="var(--red)"/></button></td>
                        </tr>
                      ))}
                    </tbody>
                    <tfoot><tr>
                      <td colSpan={2} style={{paddingTop:7,fontSize:11,color:"var(--text3)",borderTop:"1px solid var(--border2)"}}>Total for this vehicle</td>
                      <td style={{paddingTop:7,textAlign:"right",fontWeight:800,color:"var(--gold)",borderTop:"1px solid var(--border2)"}}>{fmt(records.reduce((s,r)=>s+(Number(r.cost)||0),0))}</td>
                      <td style={{borderTop:"1px solid var(--border2)"}}></td>
                    </tr></tfoot>
                  </table>
                )}
              </div>
            );
          })}
        </div>
      )}

      {/* MECHANICAL */}
      {tab==="mechanical"&&(
        <div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <div style={{fontSize:13,color:"var(--text2)"}}>Repairs & faults · Total: <b style={{color:"var(--red)"}}>{fmt(totMech)}</b></div>
            <button className="btn" style={{fontSize:11,padding:"8px 14px"}} onClick={()=>setModal({type:"mech"})}>
              <Ic name="plus" size={12} color="#0a0a0f"/> Log Fault
            </button>
          </div>
          {(exp.mechanical||[]).length===0&&(
            <div style={{textAlign:"center",padding:"40px 20px",color:"var(--text3)"}}>
              <div style={{fontSize:32,marginBottom:10}}>🔧</div>
              <div style={{fontSize:13}}>No mechanical fault records yet.</div>
            </div>
          )}
          {drivers.map(d=>{
            const records=(exp.mechanical||[]).filter(m=>m.driverId===d.id).sort((a,b)=>new Date(b.date)-new Date(a.date));
            if(!records.length)return null;
            return(
              <div key={d.id} style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:8,padding:14,marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
                  <div><span style={{fontSize:13,fontWeight:700,color:"var(--text)"}}>{d.name||"—"}</span><span style={{fontSize:11,color:"var(--text3)",marginLeft:8}}>{d.plate||""}</span></div>
                  <span style={{fontSize:14,fontWeight:800,color:"var(--red)",fontFamily:"var(--fd)"}}>{fmt(records.reduce((s,r)=>s+(Number(r.cost)||0),0))}</span>
                </div>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                  <thead><tr style={{color:"var(--text3)"}}>
                    <th style={{textAlign:"left",padding:"4px 0",borderBottom:"1px solid var(--border2)"}}>DATE</th>
                    <th style={{textAlign:"left",padding:"4px 0",borderBottom:"1px solid var(--border2)"}}>FAULT</th>
                    <th style={{textAlign:"right",padding:"4px 0",borderBottom:"1px solid var(--border2)"}}>COST</th>
                    <th style={{width:28,borderBottom:"1px solid var(--border2)"}}></th>
                  </tr></thead>
                  <tbody>
                    {records.map(r=>(
                      <tr key={r.id}>
                        <td style={{padding:"6px 0",color:"var(--text2)",whiteSpace:"nowrap"}}>{fmtD(r.date)}</td>
                        <td style={{padding:"6px 0",color:"var(--text2)"}}>{r.description||"—"}</td>
                        <td style={{padding:"6px 0",textAlign:"right",color:"var(--red)",fontWeight:700}}>{fmt(r.cost)}</td>
                        <td style={{padding:"6px 0",textAlign:"right"}}><button onClick={()=>delMech(r.id)} style={{background:"none",border:"none",cursor:"pointer",padding:2,opacity:.6}}><Ic name="trash" size={12} color="var(--red)"/></button></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            );
          })}
          {drivers.filter(d=>!(exp.mechanical||[]).some(m=>m.driverId===d.id)).map(d=>(
            <div key={d.id} style={{background:"var(--bg2)",border:"1px dashed var(--border2)",borderRadius:8,padding:"12px 16px",marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontSize:12,color:"var(--text3)"}}>{d.name||"—"} — No faults recorded</span>
              <button className="btn" style={{fontSize:10,padding:"5px 12px"}} onClick={()=>setModal({type:"mech",driverId:d.id})}>Add</button>
            </div>
          ))}
        </div>
      )}

      {/* ROADWORTHY */}
      {tab==="roadworthy"&&(
        <div>
          <div style={{marginBottom:14}}>
            <div style={{fontSize:13,color:"var(--text2)"}}>Yearly roadworthy renewal · Total paid: <b style={{color:"var(--blue)"}}>{fmt(totRW)}</b></div>
            <div style={{fontSize:11,color:"var(--text3)",marginTop:3}}>Alerts appear at 60 days and 30 days before expiry</div>
          </div>
          {drivers.map(d=>{
            const r=exp.roadworthy?.[d.id];
            const nextDate=r?.lastDate?addYears(r.lastDate,1):null;
            const days=daysUntil(nextDate);
            return(
              <div key={d.id} style={{background:"var(--bg2)",border:`1px solid ${days!==null&&days<=30?"var(--red)":days!==null&&days<=60?"var(--gold)":"var(--border)"}`,borderRadius:8,padding:16,marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8,marginBottom:r?.lastDate?12:0}}>
                  <div>
                    <div style={{fontSize:13,fontWeight:700,color:"var(--text)"}}>{d.name||"—"}</div>
                    <div style={{fontSize:11,color:"var(--text3)",marginTop:2}}>{d.plate||"No plate"}</div>
                  </div>
                  <button onClick={()=>setModal({type:"roadworthy",driverId:d.id,data:r||{}})}
                    style={{background:"var(--bg)",border:"1px solid var(--border2)",borderRadius:6,padding:"7px 14px",color:"var(--text2)",fontSize:12,cursor:"pointer",fontFamily:"var(--fm)"}}>
                    {r?.lastDate?"✏ Edit":"＋ Set Date"}
                  </button>
                </div>
                {r?.lastDate?(
                  <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:8}}>
                    <div style={{background:"var(--bg)",borderRadius:6,padding:12}}>
                      <div style={{fontSize:10,letterSpacing:1,color:"var(--text3)",marginBottom:4,textTransform:"uppercase"}}>Last Renewed</div>
                      <div style={{fontSize:13,fontWeight:700,color:"var(--text)"}}>{fmtD(r.lastDate)}</div>
                    </div>
                    <div style={{background:"var(--bg)",borderRadius:6,padding:12,border:`1px solid ${urgColor(days)}30`}}>
                      <div style={{fontSize:10,letterSpacing:1,color:"var(--text3)",marginBottom:4,textTransform:"uppercase"}}>Next Renewal</div>
                      <div style={{fontSize:13,fontWeight:700,color:urgColor(days)}}>{fmtD(nextDate)}</div>
                      <div style={{fontSize:11,color:urgColor(days),marginTop:2}}>({urgLabel(days)})</div>
                    </div>
                    <div style={{background:"var(--bg)",borderRadius:6,padding:12}}>
                      <div style={{fontSize:10,letterSpacing:1,color:"var(--text3)",marginBottom:4,textTransform:"uppercase"}}>Fee Paid</div>
                      <div style={{fontSize:13,fontWeight:700,color:"var(--blue)"}}>{fmt(r.cost||0)}</div>
                    </div>
                    {r.notes&&<div style={{background:"var(--bg)",borderRadius:6,padding:12,gridColumn:"1/-1"}}>
                      <div style={{fontSize:10,letterSpacing:1,color:"var(--text3)",marginBottom:3,textTransform:"uppercase"}}>Notes</div>
                      <div style={{fontSize:12,color:"var(--text2)"}}>{r.notes}</div>
                    </div>}
                  </div>
                ):(
                  <div style={{fontSize:12,color:"var(--text3)"}}>⚠ No date set — click "Set Date" to record this vehicle's roadworthy</div>
                )}
              </div>
            );
          })}
        </div>
      )}

      {/* INSURANCE */}
      {tab==="insurance"&&(
        <div>
          <div style={{marginBottom:14}}>
            <div style={{fontSize:13,color:"var(--text2)"}}>Yearly insurance renewal · Total paid: <b style={{color:"var(--green)"}}>{fmt(totIns)}</b></div>
            <div style={{fontSize:11,color:"var(--text3)",marginTop:3}}>Alerts appear at 60 days and 30 days before expiry</div>
          </div>
          {drivers.map(d=>{
            const r=exp.insurance?.[d.id];
            const nextDate=r?.lastDate?addYears(r.lastDate,1):null;
            const days=daysUntil(nextDate);
            return(
              <div key={d.id} style={{background:"var(--bg2)",border:`1px solid ${days!==null&&days<=30?"var(--red)":days!==null&&days<=60?"var(--gold)":"var(--border)"}`,borderRadius:8,padding:16,marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8,marginBottom:r?.lastDate?12:0}}>
                  <div>
                    <div style={{fontSize:13,fontWeight:700,color:"var(--text)"}}>{d.name||"—"}</div>
                    <div style={{fontSize:11,color:"var(--text3)",marginTop:2}}>{d.plate||"No plate"}</div>
                  </div>
                  <button onClick={()=>setModal({type:"insurance",driverId:d.id,data:r||{}})}
                    style={{background:"var(--bg)",border:"1px solid var(--border2)",borderRadius:6,padding:"7px 14px",color:"var(--text2)",fontSize:12,cursor:"pointer",fontFamily:"var(--fm)"}}>
                    {r?.lastDate?"✏ Edit":"＋ Set Date"}
                  </button>
                </div>
                {r?.lastDate?(
                  <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:8}}>
                    <div style={{background:"var(--bg)",borderRadius:6,padding:12}}>
                      <div style={{fontSize:10,letterSpacing:1,color:"var(--text3)",marginBottom:4,textTransform:"uppercase"}}>Last Renewed</div>
                      <div style={{fontSize:13,fontWeight:700,color:"var(--text)"}}>{fmtD(r.lastDate)}</div>
                    </div>
                    <div style={{background:"var(--bg)",borderRadius:6,padding:12,border:`1px solid ${urgColor(days)}30`}}>
                      <div style={{fontSize:10,letterSpacing:1,color:"var(--text3)",marginBottom:4,textTransform:"uppercase"}}>Next Renewal</div>
                      <div style={{fontSize:13,fontWeight:700,color:urgColor(days)}}>{fmtD(nextDate)}</div>
                      <div style={{fontSize:11,color:urgColor(days),marginTop:2}}>({urgLabel(days)})</div>
                    </div>
                    <div style={{background:"var(--bg)",borderRadius:6,padding:12}}>
                      <div style={{fontSize:10,letterSpacing:1,color:"var(--text3)",marginBottom:4,textTransform:"uppercase"}}>Premium Paid</div>
                      <div style={{fontSize:13,fontWeight:700,color:"var(--green)"}}>{fmt(r.cost||0)}</div>
                    </div>
                    {r.insurer&&<div style={{background:"var(--bg)",borderRadius:6,padding:12}}>
                      <div style={{fontSize:10,letterSpacing:1,color:"var(--text3)",marginBottom:3,textTransform:"uppercase"}}>Insurer</div>
                      <div style={{fontSize:12,color:"var(--text2)"}}>{r.insurer}</div>
                    </div>}
                    {r.notes&&<div style={{background:"var(--bg)",borderRadius:6,padding:12,gridColumn:"1/-1"}}>
                      <div style={{fontSize:10,letterSpacing:1,color:"var(--text3)",marginBottom:3,textTransform:"uppercase"}}>Notes</div>
                      <div style={{fontSize:12,color:"var(--text2)"}}>{r.notes}</div>
                    </div>}
                  </div>
                ):(
                  <div style={{fontSize:12,color:"var(--text3)"}}>⚠ No date set — click "Set Date" to record this vehicle's insurance</div>
                )}
              </div>
            );
          })}
        </div>
      )}

      {/* ENTRY MODALS */}
      {modal&&(modal.type==="oil"||modal.type==="mech")&&(
        <ExpEntryModal
          title={modal.type==="oil"?"🛢 Oil Change Record":"🔧 Mechanical Fault"}
          drivers={drivers}
          initDriverId={modal.driverId}
          isMech={modal.type==="mech"}
          IS={IS}
          onClose={()=>setModal(null)}
          onSave={modal.type==="oil"?saveOil:saveMech}
        />
      )}
      {modal&&(modal.type==="roadworthy"||modal.type==="insurance")&&(
        <RenewalModal
          title={modal.type==="roadworthy"?"🛡 Roadworthy Renewal":"🔒 Insurance Renewal"}
          costLabel={modal.type==="roadworthy"?"Roadworthy Fee (GH₵)":"Insurance Premium (GH₵)"}
          showInsurer={modal.type==="insurance"}
          initData={modal.data||{}}
          IS={IS}
          onClose={()=>setModal(null)}
          onSave={d=>modal.type==="roadworthy"?saveRW(modal.driverId,d):saveIns(modal.driverId,d)}
        />
      )}
    </div>
  );
}

function ExpEntryModal({title,drivers,initDriverId,isMech,IS,onClose,onSave}){
  const today=new Date().toISOString().slice(0,10);
  const [f,setF]=useState({driverId:initDriverId||"",date:today,cost:"",notes:"",description:""});
  const upd=(k,v)=>setF(p=>({...p,[k]:v}));
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.8)",zIndex:400,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={onClose}>
      <div style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:"16px 16px 0 0",padding:22,width:"100%",maxWidth:500,maxHeight:"90vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
          <span style={{fontSize:15,fontWeight:700,color:"var(--text)"}}>{title}</span>
          <button onClick={onClose} style={{background:"none",border:"none",color:"var(--text3)",cursor:"pointer",fontSize:22,lineHeight:1}}>✕</button>
        </div>
        <div style={{marginBottom:14}}>
          <div style={{fontSize:10,letterSpacing:2,color:"var(--text3)",marginBottom:6,textTransform:"uppercase"}}>Vehicle / Driver</div>
          <select style={IS} value={f.driverId} onChange={e=>upd("driverId",e.target.value)}>
            <option value="">Select driver…</option>
            {drivers.map(d=><option key={d.id} value={d.id}>{d.name||"—"}{d.plate?" · "+d.plate:""}</option>)}
          </select>
        </div>
        <div style={{marginBottom:14}}>
          <div style={{fontSize:10,letterSpacing:2,color:"var(--text3)",marginBottom:6,textTransform:"uppercase"}}>{isMech?"Fault Date":"Date of Change"}</div>
          <input type="date" style={IS} value={f.date} onChange={e=>upd("date",e.target.value)}/>
        </div>
        {isMech&&<div style={{marginBottom:14}}>
          <div style={{fontSize:10,letterSpacing:2,color:"var(--text3)",marginBottom:6,textTransform:"uppercase"}}>Fault Description</div>
          <input style={IS} value={f.description} placeholder="e.g. Engine overheating, brake pads…" onChange={e=>upd("description",e.target.value)}/>
        </div>}
        <div style={{marginBottom:14}}>
          <div style={{fontSize:10,letterSpacing:2,color:"var(--text3)",marginBottom:6,textTransform:"uppercase"}}>Cost (GH₵)</div>
          <input type="number" style={IS} value={f.cost} placeholder="0" onChange={e=>upd("cost",e.target.value)}/>
        </div>
        <div style={{marginBottom:20}}>
          <div style={{fontSize:10,letterSpacing:2,color:"var(--text3)",marginBottom:6,textTransform:"uppercase"}}>Notes (optional)</div>
          <input style={IS} value={f.notes} placeholder={isMech?"Workshop name, parts used…":"Brand of oil, mileage…"} onChange={e=>upd("notes",e.target.value)}/>

          Save Record
        </button>
      </div>
    </div>
  );
}

function RenewalModal({title,costLabel,showInsurer,initData,IS,onClose,onSave}){

  const upd=(k,v)=>setF(p=>({...p,[k]:v}));
  const nextDate=f.lastDate?new Date(new Date(f.lastDate+"T12:00").setFullYear(new Date(f.lastDate+"T12:00").getFullYear()+1)).toLocaleDateString("en-GH",{day:"numeric",month:"long",year:"numeric"}):"";
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.8)",zIndex:400,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={onClose}>
      <div style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:"16px 16px 0 0",padding:22,width:"100%",maxWidth:500,maxHeight:"90vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
          <span style={{fontSize:15,fontWeight:700,color:"var(--text)"}}>{title}</span>
          <button onClick={onClose} style={{background:"none",border:"none",color:"var(--text3)",cursor:"pointer",fontSize:22,lineHeight:1}}>✕</button>
        </div>
        <div style={{marginBottom:14}}>
          <div style={{fontSize:10,letterSpacing:2,color:"var(--text3)",marginBottom:6,textTransform:"uppercase"}}>Last Renewal Date</div>
          <input type="date" style={IS} value={f.lastDate} onChange={e=>upd("lastDate",e.target.value)}/>
        </div>
        {f.lastDate&&<div style={{background:"var(--bg)",border:"1px solid var(--gold)33",borderRadius:6,padding:"12px 16px",marginBottom:14}}>
          <div style={{fontSize:10,letterSpacing:2,color:"var(--text3)",marginBottom:4,textTransform:"uppercase"}}>Next Renewal (Auto-calculated)</div>
          <div style={{fontSize:15,fontWeight:700,color:"var(--gold)"}}>{nextDate}</div>
        </div>}
        <div style={{marginBottom:14}}>
          <div style={{fontSize:10,letterSpacing:2,color:"var(--text3)",marginBottom:6,textTransform:"uppercase"}}>{costLabel}</div>
          <input type="number" style={IS} value={f.cost} placeholder="0" onChange={e=>upd("cost",e.target.value)}/>
        </div>
        {showInsurer&&<div style={{marginBottom:14}}>
          <div style={{fontSize:10,letterSpacing:2,color:"var(--text3)",marginBottom:6,textTransform:"uppercase"}}>Insurance Company</div>
          <input style={IS} value={f.insurer} placeholder="Enterprise, SIC, Prudential…" onChange={e=>upd("insurer",e.target.value)}/>
        </div>}
        <div style={{marginBottom:22}}>
          <div style={{fontSize:10,letterSpacing:2,color:"var(--text3)",marginBottom:6,textTransform:"uppercase"}}>Notes (optional)</div>
          <input style={IS} value={f.notes} placeholder="Policy no., sticker no.…" onChange={e=>upd("notes",e.target.value)}/>
        </div>
        <button className="btn" style={{width:"100%",padding:14,fontSize:13,justifyContent:"center"}} onClick={()=>onSave(f)} disabled={!f.lastDate}>
          Save
        </button>
      </div>
    </div>
  );
}

// ── ADMIN PANEL (DEV account only) — activate users ──────────
function VAdmin(){
  const [users,setUsers]=useState({});
  const [pending,setPending]=useState([]);
  const [search,setSearch]=useState("");
  const [msg,setMsg]=useState(null);
  const [loading,setLoading]=useState(true);
  const [aTab,setATab]=useState("overview"); // overview | users | payments | settings
  const [customDays,setCustomDays]=useState(30);
  const [expandUser,setExpandUser]=useState(null);

  const [addPayModal,setAddPayModal]=useState(false);

  async function reload(){
    setLoading(true);
    const u=await getUsers();
    setUsers(u);
    if(db){
      const snap=await db.collection("pending_payments").get();
      setPending(snap.docs.map(d=>({id:d.id,...d.data()})));
    } else {
      const lp=[];
      try{for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith("pg-pending-")){const v=JSON.parse(localStorage.getItem(k)||"null");if(v&&v.status==="pending")lp.push({id:v.username,...v});}}}catch(e){}
      setPending(lp);
    }
    setLoading(false);
  }

  useEffect(()=>{reload();},[]);

  async function addManualPending(username,plan,amount,notes){
    if(!username)return;
    const rec={username,plan,amount:Number(amount)||0,requestedAt:Date.now(),status:"pending",addedManually:true,notes:notes||""};
    lsSet("pg-pending-"+username,rec);
    if(db) await db.collection("pending_payments").doc(username).set(rec);
    setPending(p=>{const ex=p.find(x=>x.id===username);return ex?p.map(x=>x.id===username?{id:username,...rec}:x):[...p,{id:username,...rec}];});
    setAddPayModal(false);
    setMsg({type:"ok",text:"✓ Payment entry added for @"+username});
    setTimeout(()=>setMsg(null),5000);
  }

  async function activate(username,plan,days){
    const d=days||customDays||30;
    const paidUntil=Date.now()+d*86400000;
    const data={plan,paid:true,paidUntil,activatedAt:Date.now(),activatedBy:DEV_U};
    setSub(username,data);
    if(db){
      await db.collection("subscriptions").doc(username).set(data);
      await db.collection("pending_payments").doc(username).delete();
    }
    setPending(p=>p.filter(x=>x.id!==username));
    // Update local users display
    setUsers(u=>({...u}));
    setMsg({type:"ok",text:`✓ @${username} activated — ${PLANS[plan]?.name} for ${d} days`});
    setTimeout(()=>setMsg(null),4000);
  }

  async function deactivate(username){
    if(!window.confirm(`Deactivate @${username}? They will lose access immediately.`))return;
    const data={plan:null,paid:false,paidUntil:0,revokedAt:Date.now()};
    setSub(username,data);
    if(db) await db.collection("subscriptions").doc(username).set(data);
    setMsg({type:"warn",text:`@${username} deactivated`});
    setTimeout(()=>setMsg(null),4000);
  }

  async function extendDays(username,days){
    const cur=subStatus(username);
    const base=cur.active&&cur.paidUntil?cur.paidUntil:Date.now();
    const paidUntil=base+(days*86400000);
    const data={...getSub(username),paid:true,paidUntil,extendedAt:Date.now()};
    setSub(username,data);
    if(db) await db.collection("subscriptions").doc(username).set(data);
    setMsg({type:"ok",text:`✓ @${username} extended by ${days} days`});
    setTimeout(()=>setMsg(null),4000);
  }

  async function deleteUser(username){
    if(!window.confirm(`PERMANENTLY delete @${username} and ALL their data? This cannot be undone.`))return;
    const u=await getUsers();
    delete u[username];
    await setUsers(u);
    if(db){
      await db.collection("users").doc(username).delete();
      await db.collection("subscriptions").doc(username).delete();
      await db.collection("pending_payments").doc(username).delete();
    }
    lsSet(`pg-sub-${username}`,null);
    setUsers({...u});
    setMsg({type:"warn",text:`@${username} permanently deleted`});
    setTimeout(()=>setMsg(null),4000);
  }

  const allUsers=Object.keys(users).filter(u=>u!==DEV_U);
  const filtered=allUsers.filter(u=>u.includes(search.toLowerCase())||(users[u]?.business||"").toLowerCase().includes(search.toLowerCase()));

  // Stats
  const activeUsers=allUsers.filter(u=>{ const s=subStatus(u); return s.active&&!s.trial; });
  const trialUsers=allUsers.filter(u=>subStatus(u).trial);
  const expiredUsers=allUsers.filter(u=>subStatus(u).expired);
  const revenue=activeUsers.reduce((t,u)=>{ const s=subStatus(u); return t+(PLANS[s.plan]?.price||0); },0);

  if(loading)return<div style={{textAlign:"center",padding:60,color:"var(--text3)"}}>
    <div className="spinner" style={{margin:"0 auto 12px"}}/>Loading admin data…
  </div>;

  return(
    <div>
      {/* Admin header */}
      <div style={{background:"linear-gradient(135deg,#1a1200,#0a0a0f)",border:"1px solid var(--gold)",borderRadius:10,padding:"16px 20px",marginBottom:16,display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
        <div>
          <div style={{fontFamily:"var(--fd)",fontSize:18,fontWeight:800,color:"var(--gold)"}}>⚙ Admin Dashboard</div>
          <div style={{fontSize:10,color:"var(--text3)",letterSpacing:2,marginTop:2}}>AMISCO4U2 · FULL ACCESS</div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          <span style={{fontSize:11,color:"var(--text3)"}}>Firebase: <span style={{color:db?"var(--green)":"var(--red)"}}>{db?"✓ Online":"Offline"}</span></span>
          <button className="btn-sm" style={{fontSize:11,padding:"7px 16px"}} onClick={reload}>↻ Refresh</button>
          <button className="btn" style={{fontSize:11,padding:"8px 16px"}} onClick={()=>setAddPayModal(true)}>＋ Add Payment</button>
        </div>
      </div>
      {addPayModal&&<AddPayModal onClose={()=>setAddPayModal(false)} onSave={addManualPending}/>}

      {msg&&<div className={`notice ${msg.type==="ok"?"notice-ok":"notice-warn"}`} style={{marginBottom:14}}>{msg.text}</div>}

      {/* Tabs */}
      <div className="report-tabs" style={{marginBottom:16}}>
        {[["overview","Overview"],["users","Users"],["payments","Payments"],["settings","Settings"]].map(([id,lbl])=>(
          <button key={id} className={`report-tab${aTab===id?" active":""}`} onClick={()=>setATab(id)}>{lbl}</button>
        ))}
      </div>

      {/* ── OVERVIEW ── */}
      {aTab==="overview"&&(
        <div>
          {/* KPI row */}
          <div className="stats-grid" style={{marginBottom:14}}>
            <div className="stat-card">
              <div className="stat-label">Total Users</div>
              <div className="stat-val">{allUsers.length}</div>
              <div className="stat-sub">registered accounts</div>
            </div>
            <div className="stat-card">
              <div className="stat-label">Paying</div>
              <div className="stat-val" style={{color:"var(--green)"}}>{activeUsers.length}</div>
              <div className="stat-sub">active subscriptions</div>
            </div>
            <div className="stat-card">
              <div className="stat-label">On Trial</div>
              <div className="stat-val" style={{color:"var(--gold)"}}>{trialUsers.length}</div>
              <div className="stat-sub">free trial users</div>
            </div>
            <div className="stat-card">
              <div className="stat-label">Monthly Revenue</div>
              <div className="stat-val" style={{fontSize:16}}>{fmt(revenue)}</div>
              <div className="stat-sub">from {activeUsers.length} paid users</div>
            </div>
          </div>

          {/* Pending payments alert */}
          {pending.length>0&&(
            <div className="card" style={{marginBottom:14,border:"1px solid var(--gold)"}}>
              <div className="sec-title" style={{color:"var(--gold)"}}>🔔 Pending Payments — Action Required ({pending.length})</div>
              {pending.map(p=>{
                const plan=PLANS[p.plan];
                const age=Math.floor((Date.now()-p.requestedAt)/60000);
                const ageStr=age<60?`${age}m ago`:age<1440?`${Math.floor(age/60)}h ago`:`${Math.floor(age/1440)}d ago`;
                return(
                  <div key={p.id} style={{padding:"14px 0",borderBottom:"1px solid var(--border)"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:8,marginBottom:8}}>
                      <div>
                        <div style={{fontWeight:700,fontSize:14,color:"var(--text)",marginBottom:3}}>@{p.id}</div>
                        <div style={{fontSize:11,color:"var(--text3)"}}>{plan?.name||p.plan} · {plan?.priceLabel} · {ageStr}</div>
                        {p.addedManually&&<span style={{display:"inline-block",marginTop:4,fontSize:9,background:"#3b82f622",color:"var(--blue)",border:"1px solid #3b82f644",borderRadius:4,padding:"2px 7px",letterSpacing:1}}>MANUALLY ADDED</span>}
                        {p.notes&&<div style={{fontSize:11,color:"var(--gold)",marginTop:4}}>📝 {p.notes}</div>}
                      </div>
                      <button className="btn-danger" style={{fontSize:10,padding:"7px 12px"}} onClick={()=>deactivate(p.id)}>Reject</button>
                    </div>
                    <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                      {Object.values(PLANS).map(pl=>(
                        <button key={pl.id} className={pl.id===p.plan?"btn":"btn-sm"} style={{padding:"7px 12px",fontSize:10}} onClick={()=>activate(p.id,pl.id,30)}>
                          ✓ {pl.name} (30d)
                        </button>
                      ))}
                      <button className="btn-sm" style={{fontSize:10,padding:"7px 12px",color:"var(--green)",borderColor:"var(--green)"}} onClick={()=>activate(p.id,p.plan||"standard",90)}>✓ 90 days</button>
                      <button className="btn-sm" style={{fontSize:10,padding:"7px 12px",color:"var(--green)",borderColor:"var(--green)"}} onClick={()=>activate(p.id,p.plan||"standard",365)}>✓ 1 year</button>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
          {pending.length===0&&(
            <div style={{textAlign:"center",padding:"20px",color:"var(--text3)",fontSize:11,marginBottom:14}}>
              ✓ No pending payments
            </div>
          )}

          {/* Plan breakdown */}
          <div className="card">
            <div className="sec-title">Subscription Breakdown</div>
            {Object.values(PLANS).map(pl=>{
              const count=activeUsers.filter(u=>subStatus(u).plan===pl.id).length;
              return(
                <div key={pl.id} className="bar-row">
                  <div className="bar-label" style={{color:pl.color,fontWeight:600}}>{pl.name}</div>
                  <div className="bar-track">
                    <div className="bar-fill rank-1" style={{width:`${activeUsers.length?pct(count,activeUsers.length):0}%`,background:pl.color}}>
                      {count>0&&<span style={{color:"#0a0a0f",fontSize:10}}>{count} user{count!==1?"s":""}</span>}
                    </div>
                  </div>
                  <div className="bar-val" style={{color:pl.color}}>{fmt(count*pl.price)}/mo</div>
                </div>
              );
            })}
            <div style={{marginTop:12,paddingTop:12,borderTop:"1px solid var(--border)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontSize:11,color:"var(--text3)"}}>Total monthly revenue</span>
              <span style={{fontSize:16,fontWeight:800,color:"var(--gold)",fontFamily:"var(--fd)"}}>{fmt(revenue)}</span>
            </div>
          </div>
        </div>
      )}

      {/* ── USERS ── */}
      {aTab==="users"&&(

          <div className="card" style={{marginBottom:14}}>
            <input className="inp" placeholder="Search by username or business…" value={search} onChange={e=>setSearch(e.target.value)}/>
          </div>

          {filtered.length===0&&<div className="card empty-state"><div className="empty-ico">👤</div><div style={{fontSize:12,letterSpacing:2}}>NO USERS YET</div></div>}

          {filtered.map(u=>{
            const status=subStatus(u);
            const usr=users[u];
            const isExpanded=expandUser===u;
            const joined=usr?.created?new Date(usr.created).toLocaleDateString():"—";
            return(
              <div key={u} className="card" style={{marginBottom:10,border:isExpanded?"1px solid var(--gold)":"1px solid var(--border)"}}>
                {/* User header row */}
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10,cursor:"pointer"}} onClick={()=>setExpandUser(isExpanded?null:u)}>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3,flexWrap:"wrap"}}>
                      <span style={{fontFamily:"var(--fd)",fontWeight:800,fontSize:14,color:"var(--text)"}}>{usr?.business||u}</span>
                      {status.trial&&<span style={{fontSize:8,color:"var(--gold)",background:"#f5a62322",padding:"2px 7px",borderRadius:99,border:"1px solid #f5a62344",letterSpacing:1}}>TRIAL · {status.daysLeft}d</span>}
                      {status.active&&!status.trial&&<span style={{fontSize:8,color:"var(--green)",background:"#22c55e22",padding:"2px 7px",borderRadius:99,border:"1px solid #22c55e44",letterSpacing:1}}>{PLANS[status.plan]?.name?.toUpperCase()} · ACTIVE</span>}
                      {status.expired&&<span style={{fontSize:8,color:"var(--red)",background:"#ef444422",padding:"2px 7px",borderRadius:99,border:"1px solid #ef444444",letterSpacing:1}}>EXPIRED</span>}
                    </div>
                    <div style={{fontSize:10,color:"var(--text3)"}}>@{u} · Joined {joined}{status.paidUntil?" · Expires "+new Date(status.paidUntil).toLocaleDateString():""}</div>
                  </div>
                  <span style={{fontSize:12,color:"var(--text3)",flexShrink:0}}>{isExpanded?"▲":"▼"}</span>
                </div>

                {/* Expanded controls */}
                {isExpanded&&(
                  <div style={{marginTop:14,paddingTop:14,borderTop:"1px solid var(--border)"}}>
                    <div style={{fontSize:9,letterSpacing:2,color:"var(--text3)",marginBottom:10,textTransform:"uppercase"}}>Activate / Extend</div>
                    <div style={{display:"flex",gap:7,flexWrap:"wrap",marginBottom:12}}>
                      {Object.values(PLANS).map(pl=>(
                        <button key={pl.id} className="btn-sm" style={{fontSize:10,padding:"7px 14px",borderColor:pl.color,color:pl.color}} onClick={()=>activate(u,pl.id,30)}>
                          {pl.name} 30d
                        </button>
                      ))}
                      {Object.values(PLANS).map(pl=>(
                        <button key={pl.id+"90"} className="btn-sm" style={{fontSize:10,padding:"7px 14px"}} onClick={()=>activate(u,pl.id,90)}>
                          {pl.name} 90d
                        </button>
                      ))}
                    </div>
                    <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:12,flexWrap:"wrap"}}>
                      <span style={{fontSize:10,color:"var(--text3)"}}>Custom days:</span>
                      <input type="number" className="inp" value={customDays} onChange={e=>setCustomDays(Number(e.target.value))} style={{width:70,padding:"6px 10px",fontSize:12}}/>
                      {status.active&&Object.values(PLANS).map(pl=>(
                        <button key={pl.id} className="btn-sm" style={{fontSize:10,padding:"7px 12px"}} onClick={()=>extendDays(u,customDays)}>
                          +{customDays}d
                        </button>
                      ))}
                      {!status.active&&Object.values(PLANS).map(pl=>(
                        <button key={pl.id} className="btn-sm" style={{fontSize:10,padding:"7px 12px",borderColor:pl.color,color:pl.color}} onClick={()=>activate(u,pl.id,customDays)}>

              const ageStr=age<60?`${age}m ago`:age<1440?`${Math.floor(age/60)}h ago`:`${Math.floor(age/1440)}d ago`;

      {/* ── SETTINGS ── */}
      {aTab==="settings"&&(
        <div>
          <div className="card" style={{marginBottom:14}}>
            <div className="sec-title">Developer Account</div>
            <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:14}}>
              <div style={{flex:1,background:"var(--bg)",borderRadius:8,padding:"14px",border:"1px solid var(--border)"}}>
                <div style={{fontSize:9,letterSpacing:2,color:"var(--text3)",marginBottom:4}}>USERNAME</div>

              </div>
              <div style={{flex:1,background:"var(--bg)",borderRadius:8,padding:"14px",border:"1px solid var(--border)"}}>
                <div style={{fontSize:9,letterSpacing:2,color:"var(--text3)",marginBottom:4}}>ACCESS LEVEL</div>
                <div style={{fontSize:14,fontWeight:700,color:"var(--green)",fontFamily:"var(--fd)"}}>Full Admin</div>
              </div>
              <div style={{flex:1,background:"var(--bg)",borderRadius:8,padding:"14px",border:"1px solid var(--border)"}}>
                <div style={{fontSize:9,letterSpacing:2,color:"var(--text3)",marginBottom:4}}>SUBSCRIPTION</div>
                <div style={{fontSize:14,fontWeight:700,color:"var(--green)",fontFamily:"var(--fd)"}}>Unlimited ∞</div>

function VTransfer({drivers,sales,wap,session,onExport,onImport}){
  return(
    <div>
      <div className="card" style={{marginBottom:14}}>
        <div className="sec-title">Install App</div>
        <InstallGuide/>
      </div>
      <div className="card" style={{marginBottom:14}}>
        <div className="sec-title">Export Data to Excel</div>
        <p style={{fontSize:12,color:"var(--text2)",lineHeight:1.7,marginBottom:16}}>
          Downloads a complete .xlsx file with Drivers, Sales, and Work &amp; Pay sheets. Use this to back up your data or open in Excel/Google Sheets.
        </p>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>
          <span style={{fontSize:10,color:"var(--green)",background:"#22c55e11",border:"1px solid #22c55e33",borderRadius:99,padding:"3px 10px"}}>{drivers.length} Drivers</span>
          <span style={{fontSize:10,color:"var(--green)",background:"#22c55e11",border:"1px solid #22c55e33",borderRadius:99,padding:"3px 10px"}}>{Object.keys(sales).length} Sales Records</span>
          <span style={{fontSize:10,color:"var(--green)",background:"#22c55e11",border:"1px solid #22c55e33",borderRadius:99,padding:"3px 10px"}}>{Object.keys(wap).length} W&P Records</span>
        </div>
        <button className="btn" onClick={onExport}><Ic name="download" size={14} color="#0a0a0f"/>Export to Excel (.xlsx)</button>
      </div>
      <div className="card">
        <div className="sec-title">Import Data from Excel</div>
        <p style={{fontSize:12,color:"var(--text2)",lineHeight:1.7,marginBottom:14}}>
          Import a .xlsx file previously exported from FleetSales. This will replace your current data. Export a backup first if needed.
        </p>
        <button className="btn btn-blue" onClick={onImport}><Ic name="upload" size={14}/>Import from Excel</button>
      </div>
    </div>
  );
}

function ImportModal({onFile,msg,onClose}){
  const ref=useRef();const [drag,setDrag]=useState(false);
  function handleDrop(e){e.preventDefault();setDrag(false);const f=e.dataTransfer.files[0];if(f)onFile(f);}
  return(
    <div className="modal-ov" onClick={onClose}>
      <div className="modal-box" onClick={e=>e.stopPropagation()}>
        <div className="modal-hdr">
          <div className="modal-title">Import Excel File</div>
          <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",color:"var(--text3)",padding:3}}><Ic name="x" size={17}/></button>
        </div>
        {msg&&<div className={`notice ${msg.type==="ok"?"notice-ok":"notice-err"}`}>{msg.type==="ok"?"✓":"⚠"} {msg.text}</div>}
        <div className={`import-zone${drag?" drag":""}`} onDragOver={e=>{e.preventDefault();setDrag(true);}} onDragLeave={()=>setDrag(false)} onDrop={handleDrop} onClick={()=>ref.current.click()}>
          <input ref={ref} type="file" accept=".xlsx,.xls" onChange={e=>{if(e.target.files[0])onFile(e.target.files[0]);}}/>
          <div style={{fontSize:36,marginBottom:10}}>📂</div>
          <div style={{fontSize:13,color:"var(--text2)",fontWeight:600,marginBottom:5}}>Drop .xlsx file here or tap to browse</div>
          <div style={{fontSize:11,color:"var(--text3)"}}>Must be a FleetSales export file</div>
        </div>
        <div className="modal-foot"><button className="btn-outline" onClick={onClose}>Cancel</button></div>
      </div>
    </div>
  );
}

function DrvModal({driver,onSave,onClose,vehicleType}){
  const vt=getVehicle(vehicleType||"other");
  const [f,setF]=useState(driver||{color:"BLACK",name:"",tel:"",tracker:"",reg:"",workAndPay:false,wapAmount:0});
  const sv=(k,v)=>setF(p=>({...p,[k]:v}));
  return(
    <div className="modal-ov" onClick={onClose}>
      <div className="modal-box" onClick={e=>e.stopPropagation()}>
        <div className="modal-hdr">
          <div className="modal-title">{driver?"Edit Driver":"New Driver"}</div>
          <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",color:"var(--text3)",padding:3}}><Ic name="x" size={17}/></button>
        </div>
        <div className="modal-grid">
          <div><label className="lbl">Driver Name</label><input className="inp" value={f.name} onChange={e=>sv("name",e.target.value.toUpperCase())} placeholder="JOHN"/></div>
          <div><label className="lbl">{vt.colorLabel}</label>
            <select className="sel" style={{width:"100%"}} value={f.color} onChange={e=>sv("color",e.target.value)}>
              {DCOLORS.map(c=><option key={c}>{c}</option>)}
            </select>
          </div>
          <div><label className="lbl">Tel. Number</label><input className="inp" value={f.tel} onChange={e=>sv("tel",e.target.value)} placeholder="0200000000"/></div>
          <div><label className="lbl">Tracker No.</label><input className="inp" value={f.tracker} onChange={e=>sv("tracker",e.target.value)} placeholder="0200000000"/></div>
          <div style={{gridColumn:"1/-1"}}><label className="lbl">Registration No.</label><input className="inp" value={f.reg} onChange={e=>sv("reg",e.target.value.toUpperCase())} placeholder={vt.regEx}/></div>
          <div style={{gridColumn:"1/-1",display:"flex",alignItems:"center",gap:10,padding:12,background:"var(--bg)",borderRadius:6,border:"1px solid var(--border)"}}>
            <input type="checkbox" id="wchk" checked={f.workAndPay} onChange={e=>sv("workAndPay",e.target.checked)} style={{accentColor:"var(--gold)",width:15,height:15}}/>
            <label htmlFor="wchk" style={{fontSize:12,cursor:"pointer",color:"var(--text2)"}}>Work &amp; Pay driver</label>
          </div>
          {f.workAndPay&&<div style={{gridColumn:"1/-1"}}><label className="lbl">Total Amount Owed (GH&#8373;)</label><input className="inp" type="number" value={f.wapAmount} onChange={e=>sv("wapAmount",Number(e.target.value))} placeholder="0"/></div>}
        </div>
        <div className="modal-foot">
          <button className="btn-outline" onClick={onClose}>Cancel</button>
          <button className="btn" onClick={()=>onSave(f)} disabled={!f.name.trim()}>{driver?"Save Changes":"Add Driver"}</button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
